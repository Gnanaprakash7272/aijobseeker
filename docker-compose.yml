# JobMatch AI v2.0 — Docker Compose
# Run with: docker compose up --build -d   (Docker Desktop v2+)
# NOT:       docker-compose up             (old standalone CLI)

version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobmatch_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - backend_sessions:/app/jobmatch_sessions.db   # persist LangGraph sessions
      - backend_uploads:/app/uploads                 # temp resume uploads
    ports:
      - "8000:8000"         # expose for local dev; remove in prod (use nginx)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jobmatch_net

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000   # internal Docker network URL
    container_name: jobmatch_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"         # expose for local dev; remove in prod (use nginx)
    networks:
      - jobmatch_net

  # ── Nginx Reverse Proxy (production) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: jobmatch_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jobmatch_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  backend_sessions:
  backend_uploads:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  jobmatch_net:
    driver: bridge
